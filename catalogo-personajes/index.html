<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de personajes | Macarena Party Supplies</title>
  <link rel="stylesheet" href="../catalogos/shared/catalogos.css?v=compact-viewer-1">
</head>
<body>
  <header class="catalog-header">
    <a class="catalog-logo" href="../catalogos/" aria-label="Volver a catálogos">
      <img src="../Website%20-%20Source/assets/macarena-simplified.png" alt="Macarena Party Supplies">
    </a>

    <span class="header-page-counter page-counter" id="pageCounter">0 / 0</span>

    <div class="catalog-header-actions">
      <a class="catalog-button secondary" href="../catalogos/">Catálogos</a>
      <a class="catalog-button" href="https://wa.me/5213330438386">Cotizar por WhatsApp</a>
    </div>
  </header>

  <main class="catalog-shell viewer-shell">
    <section class="flipbook-panel" aria-label="Visor de catálogo de personajes">
      <div class="flipbook-stage" id="flipbookStage">
        <div class="catalog-status" id="catalogStatus">Preparando catálogo...</div>
        <div class="flipbook" id="flipbook"></div>
      </div>

      <a class="catalog-button secondary download-button" id="downloadPdf" href="../catalogos/pdfs/personajes.pdf">Descargar PDF</a>
    </section>
  </main>

  <footer class="catalog-footer">
    <small>Macarena Party Supplies™ 2026</small>
  </footer>

  <script>
    window.MPS_CATALOG = {
      pdf: "../catalogos/pdfs/personajes.pdf"
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../catalogos/shared/flipbook.js?v=compact-viewer-1" defer></script>
</body>
</html>
